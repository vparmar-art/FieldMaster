<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plant Disease Detection</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --panel: #ffffff;
        --text: #1d251f;
        --muted: #667064;
        --accent: #2f7d4f;
        --accent-dark: #245f3d;
        --border: #dfe5dc;
        --error-bg: #fff1f0;
        --error-text: #9f1d1d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 40px auto;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(29, 37, 31, 0.06);
      }

      form {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      input[type="file"] {
        flex: 1 1 260px;
        padding: 11px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fbfcfa;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font-weight: 700;
        padding: 13px 18px;
      }

      button:hover {
        background: var(--accent-dark);
      }

      .error {
        margin-top: 16px;
        border: 1px solid #f1b7b3;
        background: var(--error-bg);
        color: var(--error-text);
      }

      .results {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
        margin-top: 24px;
      }

      .image-block h2,
      .json-block h2 {
        margin: 0 0 12px;
        font-size: 1.1rem;
      }

      img {
        display: block;
        width: 100%;
        max-height: 620px;
        object-fit: contain;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
      }

      .json-block {
        grid-column: 1 / -1;
      }

      pre {
        overflow: auto;
        margin: 0;
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #101510;
        color: #eaf4e9;
        font-size: 0.95rem;
      }

      @media (max-width: 760px) {
        main {
          margin: 24px auto;
        }

        .results {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Plant Disease Detection</h1>
        <p>Upload one plant image and review Gemini detections with red bounding boxes.</p>
      </header>

      <section class="panel">
        <form method="post" enctype="multipart/form-data">
          <input type="file" name="image" accept="image/png,image/jpeg,image/webp" required>
          <button type="submit">Analyze Image</button>
        </form>
      </section>

      {% if error %}
        <section class="panel error" role="alert">{{ error }}</section>
      {% endif %}

      {% if result %}
        <section class="results">
          <div class="image-block">
            <h2>Original Image</h2>
            <img src="{{ url_for('uploaded_file', filename=original_image) }}" alt="Original uploaded plant image">
          </div>

          <div class="image-block">
            <h2>Annotated Image</h2>
            <img src="{{ url_for('uploaded_file', filename=annotated_image) }}" alt="Plant image with disease detections marked">
          </div>

          <div class="json-block">
            <h2>JSON Result</h2>
            <pre>{{ result_json }}</pre>
          </div>
        </section>
      {% endif %}
    </main>
  </body>
</html>
